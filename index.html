<!DOCTYPE html>
<html>
<head>
  <title>Charbel Portfolio</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #e3f2fd, #f4f6f9);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      width: 400px;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      color: #333;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    textarea {
      height: 80px;
      resize: none;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border: none;
      border-radius: 6px;
      background-color: #4a90e2;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background-color: #357abd;
    }

    #dashboard button:last-of-type {
      background-color: #e74c3c;
    }

    #dashboard button:last-of-type:hover {
      background-color: #c0392b;
    }

    ul {
      padding-left: 20px;
    }

    li {
      background: #f4f6f9;
      margin-top: 5px;
      padding: 6px;
      border-radius: 5px;
      font-size: 14px;
    }

  </style>
</head>
<body>

<div class="container">

<h1>My Portfolio</h1>

<div id="auth">
  <h3>Register / Login</h3>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
</div>

<div id="dashboard" style="display:none;">
  <h3>Welcome</h3>
  <textarea id="comment" placeholder="Write something..."></textarea>
  <button onclick="saveComment()">Save Comment</button>
  <button onclick="logout()">Logout</button>

  <h4>Your Comments:</h4>
  <ul id="commentsList"></ul>
</div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } 
  from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { getFirestore, collection, addDoc, query, where, getDocs } 
  from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
  import { doc, setDoc, getDoc } 
  from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDLBu4kGkOvnXgIav0RmH63bQt94cgsR_8",
  authDomain: "cbeaino.firebaseapp.com",
  projectId: "cbeaino",
  storageBucket: "cbeaino.firebasestorage.app",
  messagingSenderId: "238731920093",
  appId: "1:238731920093:web:379e6b9639a9700cc5d134",
  measurementId: "G-GFDWW273VS"
};
  const app = initializeApp(firebaseConfig);
  const auth = getAuth();
  const db = getFirestore();

  window.register = async function() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    const userCredential = await createUserWithEmailAndPassword(auth, email, password);

    await setDoc(doc(db, "users", userCredential.user.uid), {
      email: email,
      role: "client"
    });

    alert("User Registered");
  } catch (error) {
    alert("Register Error: " + error.message);
  }
}

  window.login = async function() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    try {
      await signInWithEmailAndPassword(auth, email, password);
      alert("Logged In!");
    } catch (error) {
      alert("Login Error: " + error.message);
    }
  }

  window.logout = async function() {
    const q = query(collection(db, "comments"), where("user", "==", auth.currentUser.uid));
    const querySnapshot = await getDocs(q);

    const list = document.getElementById("commentsList");
    list.innerHTML = "";

      const li = document.createElement("li");
      li.textContent = "";
      await signOut(auth);
  }

  window.saveComment = async function() {
    const comment = document.getElementById("comment").value;
    await addDoc(collection(db, "comments"), {
      text: comment,
      user: auth.currentUser.uid
    });
    document.getElementById("comment").value = "";
    loadComments();
  }

  async function loadComments() {
    const q = query(collection(db, "comments"), where("user", "==", auth.currentUser.uid));
    const querySnapshot = await getDocs(q);

    const list = document.getElementById("commentsList");
    list.innerHTML = "";

    querySnapshot.forEach((doc) => {
      const li = document.createElement("li");
      li.textContent = doc.data().text;
      list.appendChild(li);
    });
  }

  



  onAuthStateChanged(auth, async (user) => {

  if (user) {

    const userDoc = await getDoc(doc(db, "users", user.uid));
    const role = userDoc.data().role;

    document.getElementById("auth").style.display = "none";
    document.getElementById("dashboard").style.display = "block";

    if (role === "admin") {
      loadAllComments();
    } else {
      loadComments();
    }

  } else {
    document.getElementById("auth").style.display = "block";
    document.getElementById("dashboard").style.display = "none";
  }

});

async function loadAllComments() {

  const querySnapshot = await getDocs(collection(db, "comments"));

  const list = document.getElementById("commentsList");
  list.innerHTML = "";

  querySnapshot.forEach((doc) => {
    const li = document.createElement("li");
    li.textContent = doc.data().user + " : " + doc.data().text;
    list.appendChild(li);
  });

}
</script>

</body>
</html>
